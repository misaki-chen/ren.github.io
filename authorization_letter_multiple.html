<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提货签名委托授权书生成器-批量版</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "SimSun", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      font-size: 32px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .form-section {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      margin-bottom: 30px;
    }

    .form-section h2 {
      color: #333;
      margin-bottom: 25px;
      font-size: 20px;
      border-bottom: 2px solid #409EFF;
      padding-bottom: 10px;
    }

    .tips {
      background: #f0f9ff;
      border-left: 4px solid #409EFF;
      padding: 15px 20px;
      margin-bottom: 20px;
      border-radius: 4px;
      color: #606266;
      font-size: 14px;
    }

    .tips strong {
      color: #409EFF;
    }

    /* 批量输入表格 */
    .batch-table-wrapper {
      overflow-x: auto;
      margin-bottom: 20px;
    }

    .batch-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .batch-table th {
      background: #f5f7fa;
      color: #333;
      font-weight: bold;
      padding: 12px 8px;
      border: 1px solid #ddd;
      white-space: nowrap;
    }

    .batch-table th .required {
      color: #f56c6c;
    }

    .batch-table td {
      padding: 6px 4px;
      border: 1px solid #ddd;
      vertical-align: middle;
    }

    .batch-table input {
      width: 100%;
      padding: 8px 6px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      transition: border-color 0.3s;
    }

    .batch-table input:focus {
      outline: none;
      border-color: #409EFF;
      box-shadow: 0 0 0 2px rgba(64, 158, 255, 0.1);
    }

    .batch-table .row-num {
      text-align: center;
      color: #999;
      font-weight: bold;
      width: 40px;
      min-width: 40px;
    }

    .batch-table .col-plate { width: 120px; }
    .batch-table .col-name { width: 100px; }
    .batch-table .col-id { width: 200px; }
    .batch-table .col-phone { width: 140px; }
    .batch-table .col-count { width: 80px; }
    .batch-table .col-handler { width: 100px; }
    .batch-table .col-action { width: 50px; text-align: center; }

    .btn-remove-row {
      background: #f56c6c;
      color: white;
      border: none;
      border-radius: 4px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 16px;
      line-height: 28px;
      transition: background 0.3s;
    }

    .btn-remove-row:hover {
      background: #f78989;
    }

    .batch-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: #409EFF;
      color: white;
      box-shadow: 0 4px 15px rgba(64, 158, 255, 0.4);
    }

    .btn-primary:hover {
      background: #66b1ff;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(64, 158, 255, 0.5);
    }

    .btn-success {
      background: #67C23A;
      color: white;
      box-shadow: 0 4px 15px rgba(103, 194, 58, 0.4);
    }

    .btn-success:hover {
      background: #85ce61;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(103, 194, 58, 0.5);
    }

    .btn-warning {
      background: #E6A23C;
      color: white;
      box-shadow: 0 4px 15px rgba(230, 162, 60, 0.4);
    }

    .btn-warning:hover {
      background: #ebb563;
      transform: translateY(-2px);
    }

    .btn-info {
      background: #909399;
      color: white;
    }

    .btn-info:hover {
      background: #a6a9ad;
      transform: translateY(-2px);
    }

    .btn-sm {
      padding: 8px 16px;
      font-size: 13px;
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    /* 日期和共用设置区 */
    .common-settings {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding: 15px 20px;
      background: #f5f7fa;
      border-radius: 8px;
    }

    .common-settings label {
      font-weight: bold;
      color: #333;
      font-size: 14px;
    }

    .common-settings input[type="date"] {
      padding: 8px 12px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .common-settings input[type="date"]:focus {
      outline: none;
      border-color: #409EFF;
    }

    .button-group {
      text-align: center;
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    /* 快捷批量输入 */
    .quick-batch-area {
      margin-bottom: 20px;
    }

    .quick-batch-area textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: monospace;
      resize: vertical;
      transition: border-color 0.3s;
    }

    .quick-batch-area textarea:focus {
      outline: none;
      border-color: #409EFF;
      box-shadow: 0 0 0 3px rgba(64, 158, 255, 0.1);
    }

    /* 预览区 */
    .preview-section {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      display: none;
      margin-top: 30px;
    }

    .preview-section.show {
      display: block;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .preview-header-title {
      color: #67C23A;
      font-size: 20px;
      font-weight: bold;
    }

    .preview-toggle-btn {
      padding: 6px 16px;
      border: 2px solid #409EFF;
      border-radius: 6px;
      background: white;
      color: #409EFF;
      font-size: 13px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }

    .preview-toggle-btn:hover {
      background: #409EFF;
      color: white;
    }

    /* 单条预览卡片 */
    .preview-card {
      border: 1px solid #e4e7ed;
      border-radius: 8px;
      margin-bottom: 15px;
      overflow: hidden;
    }

    .preview-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #f5f7fa;
      cursor: pointer;
      user-select: none;
      transition: background 0.3s;
    }

    .preview-card-header:hover {
      background: #e8edf2;
    }

    .preview-card-header .card-title {
      font-weight: bold;
      color: #333;
      font-size: 15px;
    }

    .preview-card-header .card-toggle {
      color: #999;
      font-size: 12px;
      transition: transform 0.3s;
    }

    .preview-card-header .card-toggle.collapsed {
      transform: rotate(-90deg);
    }

    .preview-card-body {
      padding: 40px 60px;
      transition: max-height 0.3s ease, padding 0.3s ease;
      overflow: hidden;
    }

    .preview-card-body.collapsed {
      max-height: 0;
      padding: 0 60px;
    }

    /* 文档样式 */
    .document-title {
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 30px;
      color: #000;
      letter-spacing: 2px;
    }

    .document-body {
      font-size: 16px;
      line-height: 2.2;
      color: #000;
    }

    .document-body .recipient {
      margin-bottom: 20px;
      font-size: 16px;
    }

    .document-body .content-line {
      text-indent: 2em;
      margin-bottom: 5px;
      line-height: 2.2;
    }

    .document-body .underline {
      border-bottom: 1px solid #000;
      display: inline-block;
      min-width: 120px;
      text-align: center;
      padding: 0 10px;
      margin: 0 5px;
    }

    .signature-section {
      margin-top: 60px;
      text-align: right;
      padding-right: 50px;
    }

    .signature-section .line {
      margin: 25px 0;
      font-size: 16px;
    }

    .date-section {
      margin-top: 40px;
      text-align: right;
      padding-right: 50px;
      font-size: 16px;
    }

    .record-count {
      display: inline-block;
      background: #409EFF;
      color: white;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 13px;
      margin-left: 10px;
    }

    /* 分隔线 */
    .page-divider {
      border: none;
      border-top: 2px dashed #ddd;
      margin: 20px 0;
    }

    @media print {
      body { background: white; }
      .form-section, .button-group, .preview-header, .preview-card-header { display: none; }
      .preview-section { box-shadow: none; padding: 0; }
      .preview-card { border: none; }
      .preview-card-body { padding: 40px; }
      .preview-card-body.collapsed { max-height: none; padding: 40px; }
      .preview-card { page-break-after: always; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" style="display:inline-block;margin-bottom:16px;color:white;text-decoration:none;font-size:15px;opacity:0.85;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'">← 返回首页</a>
    <h1>📄 提货签名委托授权书生成器（批量版）</h1>

    <div class="form-section">
      <h2>📝 批量填写授权信息</h2>

      <div class="tips">
        <strong>💡 使用说明：</strong>
        在下方表格中添加多条记录，每条记录会生成一页授权书。支持快捷粘贴批量导入。点击"预览全部"查看效果，确认无误后"导出Word文档"即可下载（所有记录在一个文件中，每条一页）。
      </div>

      <!-- 快捷批量输入 -->
      <div class="quick-batch-area">
        <label style="display:block; margin-bottom:8px; font-weight:bold; font-size:14px; color:#333;">
          🚀 快捷批量输入（可选）：
        </label>
        <textarea id="quickBatchInput" rows="10" placeholder="每条记录用键值对格式，记录之间用空行分隔。没有的字段可不写。&#10;&#10;示例（两条记录）：&#10;车牌: 粤BGE633&#10;司机: 龙开飞&#10;司机身份证号: 43052719760213361X&#10;司机手机号: 13802261439&#10;&#10;车牌: 粤BES158&#10;司机: 田杨钊&#10;司机身份证号: 610430198410140015&#10;司机手机号: 13502810512&#10;件数: 100&#10;经手人: 张三&#10;&#10;支持的字段名：车牌/车牌号/车号、司机/姓名/驾驶员、身份证/司机身份证号、手机/电话/司机手机号、件数/提货件数、经手人"></textarea>
        <div style="margin-top:10px; display:flex; gap:10px;">
          <button class="btn btn-primary btn-sm" onclick="batchImport();trackEvent('批量导入')">
            <span>✨</span><span>批量导入到表格</span>
          </button>
          <button class="btn btn-info btn-sm" onclick="document.getElementById('quickBatchInput').value=''">
            <span>🗑️</span><span>清空</span>
          </button>
        </div>
      </div>

      <div style="text-align: center; margin: 20px 0; color: #999; font-size: 14px;">
        ——— 或在表格中手动填写 ———
      </div>

      <!-- 公共设置 -->
      <div class="common-settings" style="flex-direction: column; align-items: flex-start; gap: 12px;">
        <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap;">
          <label for="recipient">致（收件公司）：</label>
          <input type="text" id="recipient" value="东莞市光普实业发展有限公司" style="padding:8px 12px; border:2px solid #ddd; border-radius:6px; font-size:14px; width:320px;">
        </div>
        <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap;">
          <label for="docDate">日期：</label>
          <input type="date" id="docDate" value="">
          <label style="display: inline-flex; align-items: center; gap: 5px; font-weight: normal; cursor: pointer;">
            <input type="checkbox" id="noDate" onchange="document.getElementById('docDate').disabled = this.checked;"> 不需要日期
          </label>
          <label for="defaultHandler">默认经手人：</label>
          <input type="text" id="defaultHandler" value="任焱明" style="padding:8px 12px; border:2px solid #ddd; border-radius:6px; font-size:14px; width:120px;">
        </div>
      </div>

      <!-- 批量表格 -->
      <div class="batch-actions">
        <button class="btn btn-primary btn-sm" onclick="addRow()">
          <span>➕</span><span>添加一行</span>
        </button>
        <button class="btn btn-warning btn-sm" onclick="addRows(5)">
          <span>➕</span><span>添加5行</span>
        </button>
        <button class="btn btn-info btn-sm" onclick="clearAllRows()">
          <span>🗑️</span><span>清空全部</span>
        </button>
        <span style="color:#999; font-size:13px; margin-left:10px;">
          当前 <span id="rowCount" style="color:#409EFF; font-weight:bold;">1</span> 条记录
        </span>
      </div>

      <div class="batch-table-wrapper">
        <table class="batch-table" id="batchTable">
          <thead>
            <tr>
              <th class="row-num">#</th>
              <th class="col-plate"><span class="required">*</span>车牌号码</th>
              <th class="col-name"><span class="required">*</span>司机姓名</th>
              <th class="col-id"><span class="required">*</span>身份证号码</th>
              <th class="col-phone"><span class="required">*</span>手机号码</th>
              <th class="col-count">提货件数</th>
              <th class="col-handler">经手人</th>
              <th class="col-action">操作</th>
            </tr>
          </thead>
          <tbody id="batchTableBody">
          </tbody>
        </table>
      </div>

      <div class="button-group">
        <button class="btn btn-primary" onclick="previewAll();trackEvent('预览全部')" style="padding:14px 40px; font-size:16px;">
          <span>👁️</span>
          <span>预览全部</span>
        </button>
        <button id="exportBtn" class="btn btn-success" onclick="exportToWord();trackEvent('导出Word')" style="padding:14px 40px; font-size:16px;">
          <span>📥</span>
          <span>导出Word文档</span>
        </button>
      </div>
    </div>

    <div class="preview-section" id="previewSection">
      <div class="preview-header">
        <span class="preview-header-title">✅ 文档预览 <span id="previewCount" class="record-count"></span></span>
        <div>
          <button class="preview-toggle-btn" onclick="toggleAllPreviews()">全部展开/折叠</button>
        </div>
      </div>
      <div id="previewContainer"></div>
    </div>
  </div>

  <!-- 引入docx生成库 -->
  <script src="https://cdn.jsdelivr.net/npm/docx@7.8.2/build/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

  <script>
    let rowIdCounter = 0;

    /**
     * 添加一行
     */
    function addRow(data) {
      const tbody = document.getElementById('batchTableBody');
      const rowId = ++rowIdCounter;
      const tr = document.createElement('tr');
      tr.id = `row_${rowId}`;
      tr.innerHTML = `
        <td class="row-num"></td>
        <td><input type="text" data-field="plate" value="${data?.plate || ''}" placeholder="粤BGE633"></td>
        <td><input type="text" data-field="name" value="${data?.name || ''}" placeholder="龙开飞"></td>
        <td><input type="text" data-field="id" value="${data?.id || ''}" placeholder="43052719760213361X" maxlength="18" oninput="this.value=this.value.toUpperCase()"></td>
        <td><input type="text" data-field="phone" value="${data?.phone || ''}" placeholder="13802261439" maxlength="11" oninput="this.value=this.value.replace(/[^\\d]/g,'')"></td>
        <td><input type="text" data-field="count" value="${data?.count || ''}" placeholder="" oninput="this.value=this.value.replace(/[^\\d]/g,'')"></td>
        <td><input type="text" data-field="handler" value="${data?.handler || ''}" placeholder="留空用默认"></td>
        <td class="col-action"><button class="btn-remove-row" onclick="removeRow('row_${rowId}')" title="删除此行">×</button></td>
      `;
      tbody.appendChild(tr);
      updateRowNumbers();
    }

    /**
     * 添加多行
     */
    function addRows(n) {
      for (let i = 0; i < n; i++) addRow();
    }

    /**
     * 删除一行
     */
    function removeRow(rowId) {
      const row = document.getElementById(rowId);
      if (row) {
        row.remove();
        updateRowNumbers();
      }
      // 保证至少有一行
      if (document.getElementById('batchTableBody').children.length === 0) {
        addRow();
      }
    }

    /**
     * 清空全部行
     */
    function clearAllRows() {
      if (!confirm('确认清空全部记录？')) return;
      document.getElementById('batchTableBody').innerHTML = '';
      addRow();
    }

    /**
     * 更新行号
     */
    function updateRowNumbers() {
      const rows = document.getElementById('batchTableBody').children;
      for (let i = 0; i < rows.length; i++) {
        rows[i].querySelector('.row-num').textContent = i + 1;
      }
      document.getElementById('rowCount').textContent = rows.length;
    }

    /**
     * 获取所有记录数据
     */
    function getAllRecords() {
      const rows = document.getElementById('batchTableBody').children;
      const records = [];
      const defaultHandler = document.getElementById('defaultHandler').value.trim() || '任焱明';

      for (let i = 0; i < rows.length; i++) {
        const inputs = rows[i].querySelectorAll('input');
        const plate = inputs[0].value.trim();
        const name = inputs[1].value.trim();
        const id = inputs[2].value.trim();
        const phone = inputs[3].value.trim();
        const count = inputs[4].value.trim();
        const handler = inputs[5].value.trim() || defaultHandler;

        // 跳过完全空的行
        if (!plate && !name && !id && !phone) continue;

        records.push({ plate, name, id, phone, count, handler, rowIndex: i + 1 });
      }
      return records;
    }

    /**
     * 验证身份证号码格式
     */
    function validateIdNumber(idNumber) {
      return /(^\d{15}$)|(^\d{18}$)|(^\d{17}(\d|X|x)$)/.test(idNumber);
    }

    /**
     * 验证手机号码格式
     */
    function validatePhoneNumber(phoneNumber) {
      return /^1[3-9]\d{9}$/.test(phoneNumber);
    }

    /**
     * 验证所有记录
     */
    function validateRecords(records) {
      if (records.length === 0) {
        alert('❌ 请至少填写一条记录！');
        return false;
      }
      for (const r of records) {
        const prefix = `第${r.rowIndex}行`;
        if (!r.plate) { alert(`❌ ${prefix}：请输入车牌号码！`); return false; }
        if (!r.name) { alert(`❌ ${prefix}：请输入司机姓名！`); return false; }
        if (!r.id) { alert(`❌ ${prefix}：请输入身份证号码！`); return false; }
        if (!validateIdNumber(r.id)) { alert(`❌ ${prefix}：身份证号码格式不正确！`); return false; }
        if (!r.phone) { alert(`❌ ${prefix}：请输入手机号码！`); return false; }
        if (!validatePhoneNumber(r.phone)) { alert(`❌ ${prefix}：手机号码格式不正确！`); return false; }
      }
      return true;
    }

    /**
     * 获取格式化日期
     */
    function getCurrentDate() {
      const dateInput = document.getElementById('docDate').value;
      const now = dateInput ? new Date(dateInput) : new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${year}年 ${month} 月 ${day} 日`;
    }

    /**
     * 从一段文本中智能提取字段（支持自由文本、键值对混排、无分隔符等）
     * 核心思路：先用"关键词切分法"把文本拆成 field→value 对，再用"数据特征"兜底
     */
    function smartExtractRecord(text) {
      const record = { plate: '', name: '', id: '', phone: '', count: '', handler: '' };

      // ===== 策略1：关键词切分法 =====
      // 所有可能的字段关键词（允许前面有"他的/其/的"等前缀）
      const keywordMap = [
        { field: 'plate',   keywords: ['车牌号码', '车牌号', '车牌', '车号'] },
        { field: 'name',    keywords: ['司机姓名', '驾驶员', '司机', '姓名', '名字'] },
        { field: 'id',      keywords: ['身份证号码', '身份证号', '身份证', '证件号码', '证件号'] },
        { field: 'phone',   keywords: ['联系方式', '手机号码', '手机号', '联系电话', '电话号码', '手机', '电话'] },
        { field: 'count',   keywords: ['提货件数', '件数', '数量'] },
        { field: 'handler', keywords: ['经手人', '经手'] },
      ];

      // 构建一个大正则，匹配所有关键词及其后面的分隔符
      const allKeywords = keywordMap.flatMap(k => k.keywords);
      // 按长度降序排列，确保"身份证号码"优先于"身份证号"优先于"身份证"
      allKeywords.sort((a, b) => b.length - a.length);
      const kwPattern = new RegExp(
        '(?:[他她其的]*)(?:' + allKeywords.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|') + ')' +
        '[是为]?\\s*[：:.]?\\s*',
        'g'
      );

      // 找到所有关键词的位置
      const matches = [];
      let m;
      while ((m = kwPattern.exec(text)) !== null) {
        // 确定这个关键词对应哪个字段
        const matchedText = m[0];
        let field = '';
        for (const { field: f, keywords } of keywordMap) {
          if (keywords.some(kw => matchedText.includes(kw))) {
            field = f;
            break;
          }
        }
        if (field) {
          matches.push({ field, start: m.index, end: m.index + m[0].length });
        }
      }

      // 提取每个关键词到下一个关键词之间的文本作为值
      for (let i = 0; i < matches.length; i++) {
        const valueStart = matches[i].end;
        const valueEnd = (i + 1 < matches.length) ? matches[i + 1].start : text.length;
        const value = text.substring(valueStart, valueEnd).replace(/[,，;；。、\s]+$/, '').trim();
        if (value && !record[matches[i].field]) {
          record[matches[i].field] = value;
        }
      }

      // ===== 策略2：数据特征兜底（无关键词时也能识别） =====
      // 车牌号：省份汉字+字母+5位字母数字
      if (!record.plate) {
        const plateMatch = text.match(/([京津沪渝冀豫云辽黑湘皖鲁新苏浙赣鄂桂甘晋蒙陕吉闽贵粤川青藏琼宁][A-Z][A-Z0-9]{5})/);
        if (plateMatch) record.plate = plateMatch[1];
      }

      // 身份证号：18位或15位
      if (!record.id) {
        const idMatch = text.match(/(\d{17}[\dXx]|\d{15})/);
        if (idMatch) record.id = idMatch[1];
      }
      record.id = record.id.toUpperCase();

      // 手机号：1开头的11位数字（排除身份证中的子串）
      if (!record.phone) {
        const phonePattern = /1[3-9]\d{9}/g;
        let phoneMatch;
        while ((phoneMatch = phonePattern.exec(text)) !== null) {
          if (!record.id || !record.id.includes(phoneMatch[0])) {
            record.phone = phoneMatch[0];
            break;
          }
        }
      }

      // 姓名兜底：如果关键词切分取到的名字里混入了其他关键词，只保留中文字符前几个
      if (record.name) {
        const nameClean = record.name.match(/^([\u4e00-\u9fa5]{2,4})/);
        record.name = nameClean ? nameClean[1] : record.name;
      }

      return record;
    }

    /**
     * 批量导入 - 智能识别键值对、自由文本、混排格式，空行分隔多条记录
     */
    function batchImport() {
      const text = document.getElementById('quickBatchInput').value.trim();
      if (!text) {
        alert('❌ 请先粘贴信息到快捷输入框！');
        return;
      }

      // 用空行分隔多条记录
      const blocks = text.split(/\n\s*\n/).filter(b => b.trim());
      const imported = [];

      for (const block of blocks) {
        const record = smartExtractRecord(block);

        // 至少有一个关键字段才算有效记录
        if (record.plate || record.name || record.id || record.phone) {
          imported.push(record);
        }
      }

      if (imported.length === 0) {
        alert('❌ 未能识别到有效记录！请检查格式。\n\n支持格式如：\n车牌号是: 粤BGE633 姓名是: 龙开飞 身份证号: 43052719760213361X 手机号: 13802261439\n\n也支持直接粘贴含车牌、身份证、手机号的任意文本。');
        return;
      }

      // 清空现有空行，然后添加导入的数据
      const tbody = document.getElementById('batchTableBody');
      const existingRecords = getAllRecords();
      if (existingRecords.length === 0) {
        tbody.innerHTML = '';
      }

      for (const item of imported) {
        addRow(item);
      }

      alert(`✅ 成功导入 ${imported.length} 条记录！`);
    }

    /**
     * 预览全部
     */
    function previewAll() {
      const records = getAllRecords();
      if (!validateRecords(records)) return;

      const noDate = document.getElementById('noDate').checked;
      const dateStr = getCurrentDate();
      const recipient = document.getElementById('recipient').value.trim() || '东莞市光普实业发展有限公司';
      const container = document.getElementById('previewContainer');
      container.innerHTML = '';

      records.forEach((record, i) => {
        const card = document.createElement('div');
        card.className = 'preview-card';
        card.innerHTML = `
          <div class="preview-card-header" onclick="togglePreviewCard(this)">
            <span class="card-title">第${i + 1}页 - ${record.plate} - ${record.name}</span>
            <span class="card-toggle">▼</span>
          </div>
          <div class="preview-card-body">
            ${generatePreviewHTML(record, i, noDate, dateStr, recipient)}
          </div>
        `;
        container.appendChild(card);
      });

      document.getElementById('previewCount').textContent = `共 ${records.length} 页`;

      const previewSection = document.getElementById('previewSection');
      previewSection.classList.add('show');
      previewSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /**
     * 折叠/展开单个预览卡片
     */
    function togglePreviewCard(header) {
      const body = header.nextElementSibling;
      const toggle = header.querySelector('.card-toggle');
      body.classList.toggle('collapsed');
      toggle.classList.toggle('collapsed');
    }

    /**
     * 全部展开/折叠
     */
    let allCollapsed = false;
    function toggleAllPreviews() {
      allCollapsed = !allCollapsed;
      const bodies = document.querySelectorAll('.preview-card-body');
      const toggles = document.querySelectorAll('.card-toggle');
      bodies.forEach(b => {
        if (allCollapsed) b.classList.add('collapsed');
        else b.classList.remove('collapsed');
      });
      toggles.forEach(t => {
        if (allCollapsed) t.classList.add('collapsed');
        else t.classList.remove('collapsed');
      });
    }

    /**
     * 导出为Word文档
     */
    async function exportToWord() {
      const records = getAllRecords();
      if (!validateRecords(records)) return;

      const noDate = document.getElementById('noDate').checked;
      const currentDate = getCurrentDate();
      const recipient = document.getElementById('recipient').value.trim() || '东莞市光普实业发展有限公司';

      const exportBtn = document.getElementById('exportBtn');
      const originalText = exportBtn.textContent;
      exportBtn.textContent = '⏳ 正在生成...';
      exportBtn.disabled = true;

      try {
        if (typeof docx === 'undefined') throw new Error('docx库未加载');

        const { Document, Paragraph, TextRun, AlignmentType, UnderlineType, PageBreak } = docx;

        // 每条记录一个 section（自动分页）
        const sections = records.map((record, i) => ({
          properties: {
            page: {
              margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 },
            },
          },
          children: generateDocParagraphs(record, noDate, currentDate, recipient),
        }));

        const doc = new Document({ sections });
        const blob = await docx.Packer.toBlob(doc);

        // 文件名
        let fileName;
        if (records.length === 1) {
          fileName = `提货授权书-${records[0].plate}-${records[0].name}.docx`;
        } else {
          fileName = `提货授权书-批量${records.length}份-${getCurrentDate().replace(/\s/g, '')}.docx`;
        }
        saveAs(blob, fileName);

      } catch (error) {
        console.error('导出失败:', error);
        alert('❌ 导出失败：' + error.message + '\n\n请刷新页面后重试。');
      } finally {
        exportBtn.textContent = originalText;
        exportBtn.disabled = false;
      }
    }

      document.getElementById('docDate').value = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

      // 添加默认一行
      addRow();

      console.log('📄 提货授权书生成器（批量版）已就绪！');
    };
