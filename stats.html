<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>访问统计</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #1a1a2e; color: #eee; min-height: 100vh; padding: 40px 20px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 32px; font-size: 24px; color: #a78bfa; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px; margin-bottom: 32px;
    }
    .stat-card {
      background: #16213e; border-radius: 12px; padding: 20px;
      text-align: center; border: 1px solid #2a2a4a;
    }
    .stat-card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .stat-card .value { font-size: 32px; font-weight: bold; color: #a78bfa; }
    .stat-card .sub { font-size: 11px; color: #555; margin-top: 4px; }

    .section { margin-top: 32px; }
    .section summary {
      font-size: 16px; color: #a78bfa; margin-bottom: 12px;
      border-bottom: 1px solid #2a2a4a; padding-bottom: 8px;
      cursor: pointer; list-style: none; user-select: none;
    }
    .section summary::-webkit-details-marker { display: none; }
    .section summary::after { content: ' \25B2'; font-size: 10px; color: #555; float: right; }
    .section details:not([open]) summary::after { content: ' \25BC'; }

    /* 状态栏 */
    .status-bar {
      background: #16213e; border: 1px solid #2a2a4a; border-radius: 8px;
      padding: 12px 16px; margin-bottom: 24px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .status-bar button {
      padding: 4px 12px; border: none; border-radius: 6px;
      background: #a78bfa; color: white; cursor: pointer; font-size: 13px;
    }
    .status-bar button:hover { background: #8b6fdf; }
    .status { font-size: 12px; }
    .status.ok { color: #6ee76e; }
    .status.err { color: #f87171; }

    /* 筛选栏 */
    .filter-bar {
      background: #16213e; border: 1px solid #2a2a4a; border-radius: 8px;
      padding: 14px 16px; margin-bottom: 24px;
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    }
    .filter-bar select, .filter-bar input {
      padding: 6px 10px; border: 1px solid #2a2a4a; border-radius: 6px;
      background: #0f0f23; color: #eee; font-size: 13px;
    }
    .filter-bar select { min-width: 120px; }
    .filter-bar input { min-width: 160px; flex: 1; }
    .filter-bar label { font-size: 12px; color: #888; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }

    /* 图表区 */
    .charts-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px;
    }
    .chart-card {
      background: #16213e; border: 1px solid #2a2a4a; border-radius: 10px;
      padding: 16px;
    }
    .chart-card.full { grid-column: 1 / -1; }
    .chart-card h3 { font-size: 13px; color: #888; margin-bottom: 12px; }

    /* 访客表格 */
    .visitor-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .visitor-table th {
      background: #16213e; color: #a78bfa; padding: 8px 10px;
      text-align: left; border-bottom: 1px solid #2a2a4a;
      position: sticky; top: 0; white-space: nowrap;
    }
    .visitor-table td { padding: 6px 10px; border-bottom: 1px solid #1a1a3e; white-space: nowrap; }
    .visitor-table tr:hover td { background: #16213e; }
    .col-filter-row td {
      padding: 4px 4px; background: #0f0f23; border-bottom: 2px solid #2a2a4a;
      position: sticky; top: 32px; z-index: 1;
    }
    .col-filter {
      width: 100%; padding: 4px 6px; border: 1px solid #2a2a4a; border-radius: 4px;
      background: #16213e; color: #ccc; font-size: 11px;
    }
    select.col-filter { cursor: pointer; }
    .table-wrap {
      max-height: 500px; overflow: auto; border-radius: 8px;
      border: 1px solid #2a2a4a;
    }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
    .badge-page { background: #1e3a5f; color: #60a5fa; }
    .badge-device { background: #1e3e1e; color: #6ee76e; }
    .badge-action { background: #3e1e3e; color: #f0abfc; }

    .empty { text-align: center; color: #555; padding: 40px; }
    .back-link {
      display: inline-block; margin-bottom: 20px; color: #a78bfa;
      text-decoration: none; font-size: 14px; opacity: 0.8;
    }
    .back-link:hover { opacity: 1; }
    .note { text-align: center; color: #444; font-size: 11px; margin-top: 40px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">&larr; 返回首页</a>
    <h1>访问统计面板</h1>

    <!-- 状态栏 -->
    <div class="status-bar">
      <span class="status" id="configStatus">正在加载数据...</span>
      <button onclick="loadData()">刷新数据</button>
    </div>

    <!-- 概览卡片 -->
    <div class="stats-grid" id="overviewCards">
      <div class="stat-card">
        <div class="label">总访问记录</div>
        <div class="value" id="totalVisits">-</div>
      </div>
      <div class="stat-card">
        <div class="label">独立IP数</div>
        <div class="value" id="uniqueIps">-</div>
      </div>
      <div class="stat-card">
        <div class="label">今日访问</div>
        <div class="value" id="todayVisits">-</div>
      </div>
      <div class="stat-card">
        <div class="label">最热门工具</div>
        <div class="value" id="topPage" style="font-size:16px">-</div>
      </div>
    </div>

    <!-- 筛选栏 -->
    <div class="filter-bar" id="filterBar">
      <div class="filter-group">
        <label>时间</label>
        <select id="filterTime" onchange="applyFilters()">
          <option value="all">全部</option>
          <option value="today">今天</option>
          <option value="7d">最近7天</option>
          <option value="30d">最近30天</option>
        </select>
      </div>
      <div class="filter-group">
        <label>页面</label>
        <select id="filterPage" onchange="applyFilters()">
          <option value="all">全部页面</option>
        </select>
      </div>
      <div class="filter-group">
        <label>类型</label>
        <select id="filterType" onchange="applyFilters()">
          <option value="all">全部</option>
          <option value="visit">页面访问</option>
          <option value="action">按钮操作</option>
        </select>
      </div>
      <div class="filter-group" style="flex:1">
        <label>搜索</label>
        <input type="text" id="filterSearch" placeholder="搜索 IP / 浏览器 / 系统..." oninput="applyFilters()">
      </div>
    </div>

    <!-- 图表区 -->
    <div class="section">
      <details open>
        <summary>统计图表</summary>
        <div class="charts-grid">
          <div class="chart-card full">
            <h3>访问趋势（最近30天）</h3>
            <canvas id="chartTrend" height="80"></canvas>
          </div>
          <div class="chart-card">
            <h3>工具使用分布</h3>
            <canvas id="chartPages"></canvas>
          </div>
          <div class="chart-card">
            <h3>操作排行</h3>
            <canvas id="chartActions"></canvas>
          </div>
          <div class="chart-card">
            <h3>设备分布</h3>
            <canvas id="chartDevices"></canvas>
          </div>
          <div class="chart-card">
            <h3>浏览器分布</h3>
            <canvas id="chartBrowsers"></canvas>
          </div>
        </div>
      </details>
    </div>

    <!-- Tracker 各页面统计 -->
    <div class="section">
      <details open>
        <summary>Tracker - 各工具访问量</summary>
        <div id="pageStats"></div>
      </details>
    </div>

    <!-- 最近访客 -->
    <div class="section">
      <details open>
        <summary>最近访客记录 (<span id="filteredCount">0</span> 条)</summary>
        <div class="table-wrap">
          <table class="visitor-table">
            <thead>
              <tr>
                <th>时间</th>
                <th>页面</th>
                <th>IP</th>
                <th>设备</th>
                <th>浏览器</th>
                <th>系统</th>
                <th>分辨率</th>
                <th>语言</th>
                <th>来源</th>
              </tr>
              <tr class="col-filter-row">
                <td><input type="text" class="col-filter" data-col="0" placeholder="筛选..." oninput="applyColFilters()"></td>
                <td><select class="col-filter" data-col="1" onchange="applyColFilters()"><option value="">全部</option></select></td>
                <td><input type="text" class="col-filter" data-col="2" placeholder="筛选..." oninput="applyColFilters()"></td>
                <td><select class="col-filter" data-col="6" onchange="applyColFilters()"><option value="">全部</option></select></td>
                <td><select class="col-filter" data-col="7" onchange="applyColFilters()"><option value="">全部</option></select></td>
                <td><select class="col-filter" data-col="8" onchange="applyColFilters()"><option value="">全部</option></select></td>
                <td><input type="text" class="col-filter" data-col="9" placeholder="筛选..." oninput="applyColFilters()"></td>
                <td><select class="col-filter" data-col="10" onchange="applyColFilters()"><option value="">全部</option></select></td>
                <td><select class="col-filter" data-col="11" onchange="applyColFilters()"><option value="">全部</option></select></td>
              </tr>
            </thead>
            <tbody id="visitorList">
              <tr><td colspan="9" class="empty">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </details>
    </div>

    <p class="note">仅管理员可见</p>
  </div>

  <!-- 访客追踪 -->
  <script src="tracker.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <script>
    // ===== 全局数据 =====
    let allData = [];       // 原始数据
    let filteredData = [];  // 筛选后的数据

    // 按钮操作名列表（用于区分页面访问和按钮操作）
    const ACTION_NAMES = ['智能识别','OCR识别','预览','导出xlsx','导出xls','批量导入','预览全部','导出Word','生成PDF'];

    // 图表实例
    let charts = {};

    // ===== 数据加载 =====
    function setStatus(msg, type) {
      const el = document.getElementById('configStatus');
      el.textContent = msg;
      el.className = 'status ' + (type || '');
    }

    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1ZhWsjeQBFTUClo0dsbjV1AYzLM124OeQzIkbZl4cm2c/export?format=csv';

    async function loadData() {
      try {
        setStatus('正在加载...', '');
        const res = await fetch(SHEET_CSV_URL);
        const text = await res.text();
        const rows = text.trim().split('\n').map(row => {
          const result = [];
          let current = '', inQuotes = false;
          for (let i = 0; i < row.length; i++) {
            const ch = row[i];
            if (ch === '"') { inQuotes = !inQuotes; }
            else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
            else { current += ch; }
          }
          result.push(current.trim());
          return result;
        });
        allData = rows.slice(1).filter(r => r.some(cell => cell));
        setStatus('数据加载成功，共 ' + allData.length + ' 条记录', 'ok');
        initFilters();
        applyFilters();
      } catch(e) {
        setStatus('加载失败: ' + e.message, 'err');
      }
    }

    loadData();

    // ===== 筛选 =====
    function initFilters() {
      // 动态填充页面下拉
      const pageSet = new Set(allData.map(r => r[1]).filter(Boolean));
      const sel = document.getElementById('filterPage');
      sel.innerHTML = '<option value="all">全部页面</option>';
      [...pageSet].sort().forEach(p => {
        sel.innerHTML += '<option value="' + p + '">' + p + '</option>';
      });
    }

    function applyFilters() {
      const timeVal = document.getElementById('filterTime').value;
      const pageVal = document.getElementById('filterPage').value;
      const typeVal = document.getElementById('filterType').value;
      const searchVal = document.getElementById('filterSearch').value.toLowerCase();

      const now = new Date();
      filteredData = allData.filter(r => {
        // 时间筛选
        if (timeVal !== 'all' && r[0]) {
          const rowDate = parseDate(r[0]);
          if (rowDate) {
            const diffDays = (now - rowDate) / (1000 * 60 * 60 * 24);
            if (timeVal === 'today' && diffDays > 1) return false;
            if (timeVal === '7d' && diffDays > 7) return false;
            if (timeVal === '30d' && diffDays > 30) return false;
          }
        }
        // 页面筛选
        if (pageVal !== 'all' && r[1] !== pageVal) return false;
        // 类型筛选
        if (typeVal !== 'all') {
          const source = r[11] || '';
          const isAction = ACTION_NAMES.some(a => source.includes(a));
          if (typeVal === 'action' && !isAction) return false;
          if (typeVal === 'visit' && isAction) return false;
        }
        // 搜索
        if (searchVal) {
          const haystack = (r[2] + ' ' + r[7] + ' ' + r[8] + ' ' + r[6]).toLowerCase();
          if (!haystack.includes(searchVal)) return false;
        }
        return true;
      });

      renderOverview(filteredData);
      populateColFilterOptions(filteredData);
      applyColFilters(); // 会调用 renderTable
      renderPageStats(filteredData);
      renderCharts(filteredData);
    }

    function parseDate(str) {
      if (!str) return null;
      // 格式: 2026/4/3 17:30:00 或 2026-4-3 17:30:00
      const m = str.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
      if (m) return new Date(m[1], m[2] - 1, m[3]);
      return null;
    }

    // ===== 渲染概览 =====
    function renderOverview(rows) {
      const total = rows.length;
      const ips = new Set(rows.map(r => r[2]).filter(Boolean));
      const today = new Date().toLocaleDateString('zh-CN');
      const todayCount = rows.filter(r => r[0] && r[0].includes(today)).length;
      const pageCounts = {};
      rows.forEach(r => { const p = r[1] || '?'; pageCounts[p] = (pageCounts[p] || 0) + 1; });
      const sorted = Object.entries(pageCounts).sort((a, b) => b[1] - a[1]);

      document.getElementById('totalVisits').textContent = total;
      document.getElementById('uniqueIps').textContent = ips.size;
      document.getElementById('todayVisits').textContent = todayCount;
      document.getElementById('topPage').textContent = sorted[0] ? sorted[0][0].replace('.html','') : '-';
      document.getElementById('filteredCount').textContent = total;
    }

    // ===== 渲染页面统计 =====
    function renderPageStats(rows) {
      const pageCounts = {};
      rows.forEach(r => { const p = r[1] || '?'; pageCounts[p] = (pageCounts[p] || 0) + 1; });
      const sorted = Object.entries(pageCounts).sort((a, b) => b[1] - a[1]);
      document.getElementById('pageStats').innerHTML = sorted.map(([name, count]) =>
        '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#16213e;border-radius:8px;margin-bottom:6px;border:1px solid #2a2a4a;"><span>' + name + '</span><span style="font-weight:bold;color:#a78bfa;font-size:18px;">' + count + '</span></div>'
      ).join('');
    }

    // ===== 渲染表格 =====
    // ===== 列级筛选（Excel 风格）=====
    // 列索引映射: 页面=1, 设备=6, 浏览器=7, 系统=8, 语言=10, 来源=11
    const COL_FILTER_SELECT_COLS = [1, 6, 7, 8, 10, 11];

    function populateColFilterOptions(rows) {
      COL_FILTER_SELECT_COLS.forEach(col => {
        const sel = document.querySelector('.col-filter[data-col="' + col + '"]');
        if (!sel || sel.tagName !== 'SELECT') return;
        const prev = sel.value;
        const values = [...new Set(rows.map(r => r[col] || '').filter(Boolean))].sort();
        sel.innerHTML = '<option value="">全部</option>' + values.map(v =>
          '<option value="' + v + '"' + (v === prev ? ' selected' : '') + '>' + v + '</option>'
        ).join('');
      });
    }

    function applyColFilters() {
      const filters = {};
      document.querySelectorAll('.col-filter').forEach(el => {
        const col = el.dataset.col;
        const val = el.value.trim();
        if (val) filters[col] = val.toLowerCase();
      });

      let rows = filteredData;
      if (Object.keys(filters).length > 0) {
        rows = rows.filter(r => {
          for (const [col, val] of Object.entries(filters)) {
            const cell = (r[parseInt(col)] || '').toLowerCase();
            if (parseInt(col) === 0 || parseInt(col) === 2 || parseInt(col) === 9) {
              // 文本输入: 模糊匹配
              if (!cell.includes(val)) return false;
            } else {
              // 下拉选择: 精确匹配
              if (cell !== val) return false;
            }
          }
          return true;
        });
      }

      document.getElementById('filteredCount').textContent = rows.length;
      renderTable(rows);
    }

    function renderTable(rows) {
      const tbody = document.getElementById('visitorList');
      const recent = rows.slice().reverse().slice(0, 200);
      if (recent.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty">暂无数据</td></tr>';
        return;
      }
      tbody.innerHTML = recent.map(r => {
        const source = r[11] || '-';
        const isAction = ACTION_NAMES.some(a => source.includes(a));
        const sourceBadge = isAction
          ? '<span class="badge badge-action">' + source + '</span>'
          : source;
        return '<tr>' +
          '<td>' + (r[0] || '-') + '</td>' +
          '<td><span class="badge badge-page">' + (r[1] || '-') + '</span></td>' +
          '<td>' + (r[2] || '-') + '</td>' +
          '<td><span class="badge badge-device">' + (r[6] || '-') + '</span></td>' +
          '<td>' + (r[7] || '-') + '</td>' +
          '<td>' + (r[8] || '-') + '</td>' +
          '<td>' + (r[9] || '-') + '</td>' +
          '<td>' + (r[10] || '-') + '</td>' +
          '<td>' + sourceBadge + '</td>' +
        '</tr>';
      }).join('');
    }

    // ===== 图表 =====
    const CHART_COLORS = ['#a78bfa','#60a5fa','#6ee76e','#f0abfc','#fbbf24','#f87171','#34d399','#fb923c'];

    function destroyCharts() {
      Object.values(charts).forEach(c => c.destroy());
      charts = {};
    }

    function renderCharts(rows) {
      destroyCharts();

      // 1. 访问趋势折线图（最近30天，按天）
      const trendData = {};
      const now = new Date();
      for (let i = 29; i >= 0; i--) {
        const d = new Date(now); d.setDate(d.getDate() - i);
        const key = (d.getMonth() + 1) + '/' + d.getDate();
        trendData[key] = 0;
      }
      rows.forEach(r => {
        const d = parseDate(r[0]);
        if (d) {
          const key = (d.getMonth() + 1) + '/' + d.getDate();
          if (key in trendData) trendData[key]++;
        }
      });
      charts.trend = new Chart(document.getElementById('chartTrend'), {
        type: 'line',
        data: {
          labels: Object.keys(trendData),
          datasets: [{ label: '访问量', data: Object.values(trendData), borderColor: '#a78bfa', backgroundColor: 'rgba(167,139,250,0.1)', fill: true, tension: 0.3, pointRadius: 2 }]
        },
        options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#555' }, grid: { color: '#1a1a3e' } }, y: { ticks: { color: '#555' }, grid: { color: '#1a1a3e' }, beginAtZero: true } } }
      });

      // 2. 工具使用饼图（只统计页面访问，排除按钮操作）
      const pageVisits = {};
      rows.filter(r => !ACTION_NAMES.some(a => (r[11]||'').includes(a))).forEach(r => {
        const p = (r[1] || '?').replace('.html','');
        pageVisits[p] = (pageVisits[p] || 0) + 1;
      });
      charts.pages = new Chart(document.getElementById('chartPages'), {
        type: 'pie',
        data: { labels: Object.keys(pageVisits), datasets: [{ data: Object.values(pageVisits), backgroundColor: CHART_COLORS }] },
        options: { plugins: { legend: { position: 'bottom', labels: { color: '#888', font: { size: 11 } } } } }
      });

      // 3. 操作排行柱状图（只统计按钮操作）
      const actionCounts = {};
      rows.filter(r => ACTION_NAMES.some(a => (r[11]||'').includes(a))).forEach(r => {
        const a = r[11] || '?';
        actionCounts[a] = (actionCounts[a] || 0) + 1;
      });
      const actionSorted = Object.entries(actionCounts).sort((a, b) => b[1] - a[1]);
      charts.actions = new Chart(document.getElementById('chartActions'), {
        type: 'bar',
        data: {
          labels: actionSorted.map(a => a[0]),
          datasets: [{ data: actionSorted.map(a => a[1]), backgroundColor: CHART_COLORS.slice(0, actionSorted.length) }]
        },
        options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#555' }, grid: { color: '#1a1a3e' }, beginAtZero: true }, y: { ticks: { color: '#aaa', font: { size: 11 } }, grid: { display: false } } } }
      });

      // 4. 设备分布环形图
      const deviceCounts = {};
      rows.forEach(r => { const d = r[6] || '?'; deviceCounts[d] = (deviceCounts[d] || 0) + 1; });
      charts.devices = new Chart(document.getElementById('chartDevices'), {
        type: 'doughnut',
        data: { labels: Object.keys(deviceCounts), datasets: [{ data: Object.values(deviceCounts), backgroundColor: ['#a78bfa','#60a5fa','#fbbf24'] }] },
        options: { plugins: { legend: { position: 'bottom', labels: { color: '#888', font: { size: 11 } } } } }
      });

      // 5. 浏览器分布饼图
      const browserCounts = {};
      rows.forEach(r => { const b = r[7] || '?'; browserCounts[b] = (browserCounts[b] || 0) + 1; });
      charts.browsers = new Chart(document.getElementById('chartBrowsers'), {
        type: 'pie',
        data: { labels: Object.keys(browserCounts), datasets: [{ data: Object.values(browserCounts), backgroundColor: CHART_COLORS }] },
        options: { plugins: { legend: { position: 'bottom', labels: { color: '#888', font: { size: 11 } } } } }
      });
    }
  </script>
</body>
</html>
