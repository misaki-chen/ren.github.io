<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>访问统计</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #1a1a2e; color: #eee; min-height: 100vh; padding: 40px 20px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 32px; font-size: 24px; color: #a78bfa; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px; margin-bottom: 32px;
    }
    .stat-card {
      background: #16213e; border-radius: 12px; padding: 20px;
      text-align: center; border: 1px solid #2a2a4a;
    }
    .stat-card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .stat-card .value { font-size: 32px; font-weight: bold; color: #a78bfa; }
    .stat-card .sub { font-size: 11px; color: #555; margin-top: 4px; }

    .section { margin-top: 32px; }
    .section h2 {
      font-size: 16px; color: #a78bfa; margin-bottom: 12px;
      border-bottom: 1px solid #2a2a4a; padding-bottom: 8px;
    }
    .section summary {
      font-size: 16px; color: #a78bfa; margin-bottom: 12px;
      border-bottom: 1px solid #2a2a4a; padding-bottom: 8px;
      cursor: pointer; list-style: none; user-select: none;
    }
    .section summary::-webkit-details-marker { display: none; }
    .section summary::after {
      content: ' \25B2'; font-size: 10px; color: #555; float: right;
    }
    .section details:not([open]) summary::after { content: ' \25BC'; }

    /* 配置区 */
    .config-bar {
      background: #16213e; border: 1px solid #2a2a4a; border-radius: 8px;
      padding: 16px; margin-bottom: 24px;
    }
    .config-bar label { font-size: 13px; color: #888; display: block; margin-bottom: 6px; }
    .config-bar input {
      width: 100%; padding: 8px 12px; border: 1px solid #2a2a4a; border-radius: 6px;
      background: #0f0f23; color: #eee; font-size: 13px; font-family: monospace;
    }
    .config-bar .hint { font-size: 11px; color: #555; margin-top: 6px; }
    .config-bar button {
      margin-top: 10px; padding: 6px 16px; border: none; border-radius: 6px;
      background: #a78bfa; color: white; cursor: pointer; font-size: 13px;
    }
    .config-bar button:hover { background: #8b6fdf; }

    /* 访客表格 */
    .visitor-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    .visitor-table th {
      background: #16213e; color: #a78bfa; padding: 10px 12px;
      text-align: left; border-bottom: 1px solid #2a2a4a;
      position: sticky; top: 0;
    }
    .visitor-table td {
      padding: 8px 12px; border-bottom: 1px solid #1a1a3e;
    }
    .visitor-table tr:hover td { background: #16213e; }
    .table-wrap {
      max-height: 500px; overflow-y: auto; border-radius: 8px;
      border: 1px solid #2a2a4a;
    }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: bold;
    }
    .badge-page { background: #1e3a5f; color: #60a5fa; }
    .badge-device { background: #1e3e1e; color: #6ee76e; }

    .empty { text-align: center; color: #555; padding: 40px; }
    .back-link {
      display: inline-block; margin-bottom: 20px; color: #a78bfa;
      text-decoration: none; font-size: 14px; opacity: 0.8;
    }
    .back-link:hover { opacity: 1; }
    .note { text-align: center; color: #444; font-size: 11px; margin-top: 40px; }
    .status { font-size: 12px; margin-top: 8px; }
    .status.ok { color: #6ee76e; }
    .status.err { color: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">&larr; 返回首页</a>
    <h1>访问统计面板</h1>

    <!-- 数据加载状态 -->
    <div class="config-bar" style="padding:12px 16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span class="status" id="configStatus" style="margin:0">正在加载数据...</span>
        <button onclick="loadData()" style="margin:0;padding:4px 12px;">刷新数据</button>
      </div>
    </div>

    <!-- 概览 -->
    <div class="stats-grid" id="overviewCards">
      <div class="stat-card">
        <div class="label">总访问记录</div>
        <div class="value" id="totalVisits">-</div>
      </div>
      <div class="stat-card">
        <div class="label">独立IP数</div>
        <div class="value" id="uniqueIps">-</div>
      </div>
      <div class="stat-card">
        <div class="label">今日访问</div>
        <div class="value" id="todayVisits">-</div>
      </div>
      <div class="stat-card">
        <div class="label">最热门工具</div>
        <div class="value" id="topPage" style="font-size:16px">-</div>
      </div>
    </div>

    <!-- 不蒜子统计 -->
    <div class="section">
      <details open>
        <summary>不蒜子全站统计</summary>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="label">全站 PV</div>
            <div class="value" id="bsz_pv">-</div>
            <div class="sub">页面浏览总次数</div>
          </div>
          <div class="stat-card">
            <div class="label">全站 UV</div>
            <div class="value" id="bsz_uv">-</div>
            <div class="sub">独立访客人数</div>
          </div>
        </div>
      </details>
    </div>

    <!-- 不蒜子各页面统计 -->
    <div class="section">
      <details open>
        <summary>不蒜子 - 各工具页面 PV</summary>
        <div id="bszPageStats" style="color:#555">加载中...</div>
      </details>
    </div>

    <!-- Google Sheets 各页面统计 -->
    <div class="section">
      <details open>
        <summary>Tracker - 各工具访问量</summary>
        <div id="pageStats"></div>
      </details>
    </div>

    <!-- 最近访客 -->
    <div class="section">
      <details open>
        <summary>最近访客记录</summary>
        <div class="table-wrap">
          <table class="visitor-table">
            <thead>
              <tr>
                <th>时间</th>
                <th>页面</th>
                <th>IP / 位置</th>
                <th>设备</th>
                <th>浏览器</th>
              </tr>
            </thead>
            <tbody id="visitorList">
              <tr><td colspan="5" class="empty">未配置数据源，请先填写 Google Apps Script URL</td></tr>
            </tbody>
          </table>
        </div>
      </details>
    </div>

    <p class="note">仅管理员可见</p>
  </div>

  <!-- 不蒜子统计 -->
  <span id="busuanzi_value_site_pv" style="display:none"></span>
  <span id="busuanzi_value_site_uv" style="display:none"></span>
  <span id="busuanzi_value_page_pv" style="display:none"></span>
  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
  <!-- 访客追踪 -->
  <script src="tracker.js"></script>

  <script>
    // 从 localStorage 读取配置
    // 不蒜子全站数据加载
    (function waitBsz() {
      const check = setInterval(() => {
        const pv = document.getElementById('busuanzi_value_site_pv');
        const uv = document.getElementById('busuanzi_value_site_uv');
        if (pv && pv.textContent) {
          clearInterval(check);
          document.getElementById('bsz_pv').textContent = pv.textContent;
          document.getElementById('bsz_uv').textContent = uv.textContent;
          // 全站数据加载完后，开始加载各页面 PV
          loadBszPageStats();
        }
      }, 300);
      setTimeout(() => clearInterval(check), 10000);
    })();

    // 不蒜子各页面 PV 统计
    function loadBszPageStats() {
      const pages = [
        { name: '首页', url: 'index.html' },
        { name: '柜号确认单', url: 'container_info.html' },
        { name: '授权书 - 多格式版', url: 'authorization_letter_multiple.html' },
        { name: '多功能工具', url: 'muiltiple_tool.html' },
        { name: '统计面板', url: 'stats.html' },
      ];

      const container = document.getElementById('bszPageStats');
      container.innerHTML = '';

      pages.forEach(page => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#16213e;border-radius:8px;margin-bottom:6px;border:1px solid #2a2a4a;';
        row.innerHTML = '<span>' + page.name + '<br><small style="color:#555">' + page.url + '</small></span><span style="font-weight:bold;color:#a78bfa;font-size:18px;" id="bsz_page_' + page.url + '">-</span>';
        container.appendChild(row);

        // iframe 方式获取各页面不蒜子 PV
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = page.url;
        iframe.onload = function() {
          try {
            const doc = iframe.contentDocument;
            const pvSpan = doc.getElementById('busuanzi_value_page_pv');
            if (pvSpan) {
              const check = setInterval(() => {
                if (pvSpan.textContent && pvSpan.textContent !== '') {
                  clearInterval(check);
                  document.getElementById('bsz_page_' + page.url).textContent = pvSpan.textContent;
                  try { document.body.removeChild(iframe); } catch(e) {}
                }
              }, 300);
              setTimeout(() => { clearInterval(check); }, 8000);
            }
          } catch(e) {
            document.getElementById('bsz_page_' + page.url).textContent = '无法获取';
          }
        };
        document.body.appendChild(iframe);
      });
    }

    // 自动加载数据（直接从 Google Sheets CSV 读取）
    loadData();

    function setStatus(msg, type) {
      const el = document.getElementById('configStatus');
      el.textContent = msg;
      el.className = 'status ' + (type || '');
    }

    // Google Sheets 公开 CSV 接口（绕过 CORS）
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1ZhWsjeQBFTUClo0dsbjV1AYzLM124OeQzIkbZl4cm2c/export?format=csv';

    async function loadData() {
      try {
        setStatus('正在加载...', '');
        const res = await fetch(SHEET_CSV_URL);
        const text = await res.text();
        // 解析 CSV
        const rows = text.trim().split('\n').map(row => {
          // 简单 CSV 解析：处理逗号分隔，支持引号包裹
          const result = [];
          let current = '', inQuotes = false;
          for (let i = 0; i < row.length; i++) {
            const ch = row[i];
            if (ch === '"') { inQuotes = !inQuotes; }
            else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
            else { current += ch; }
          }
          result.push(current.trim());
          return result;
        });
        // 去掉表头
        const data = rows.slice(1).filter(r => r.some(cell => cell));
        setStatus('数据加载成功，共 ' + data.length + ' 条记录', 'ok');
        renderData(data);
      } catch(e) {
        setStatus('加载失败: ' + e.message, 'err');
      }
    }

    function renderData(rows) {
      // rows: [[时间, 页面, IP, 城市, 省份, 国家, 设备, 浏览器, 系统, 分辨率, 语言, 来源], ...]
      const total = rows.length;
      const ips = new Set(rows.map(r => r[2]).filter(Boolean));
      const today = new Date().toLocaleDateString('zh-CN');
      const todayCount = rows.filter(r => r[0] && r[0].includes(today)).length;

      // 页面统计
      const pageCounts = {};
      rows.forEach(r => {
        const p = r[1] || 'unknown';
        pageCounts[p] = (pageCounts[p] || 0) + 1;
      });
      const sorted = Object.entries(pageCounts).sort((a, b) => b[1] - a[1]);

      document.getElementById('totalVisits').textContent = total;
      document.getElementById('uniqueIps').textContent = ips.size;
      document.getElementById('todayVisits').textContent = todayCount;
      document.getElementById('topPage').textContent = sorted[0] ? sorted[0][0].replace('.html','') : '-';

      // 页面统计列表
      const pageDiv = document.getElementById('pageStats');
      pageDiv.innerHTML = sorted.map(([name, count]) => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#16213e;border-radius:8px;margin-bottom:6px;border:1px solid #2a2a4a;">
          <span>${name}</span>
          <span style="font-weight:bold;color:#a78bfa;font-size:18px;">${count}</span>
        </div>
      `).join('');

      // 访客列表（最新的在前）
      const tbody = document.getElementById('visitorList');
      const recent = rows.slice().reverse().slice(0, 100);
      if (recent.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">暂无数据</td></tr>';
        return;
      }
      tbody.innerHTML = recent.map(r => {
        const location = [r[3], r[4], r[5]].filter(Boolean).join(', ') || '-';
        return `<tr>
          <td style="white-space:nowrap">${r[0] || '-'}</td>
          <td><span class="badge badge-page">${r[1] || '-'}</span></td>
          <td>${r[2] || '-'}<br><small style="color:#666">${location}</small></td>
          <td><span class="badge badge-device">${r[6] || '-'}</span> ${r[8] || ''}</td>
          <td>${r[7] || '-'}</td>
        </tr>`;
      }).join('');
    }
  </script>
</body>
</html>
