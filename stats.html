<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>访问统计</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #1a1a2e; color: #eee; min-height: 100vh; padding: 40px 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 32px; font-size: 24px; color: #a78bfa; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px; margin-bottom: 40px;
    }
    .stat-card {
      background: #16213e; border-radius: 12px; padding: 24px;
      text-align: center; border: 1px solid #2a2a4a;
    }
    .stat-card .label { font-size: 13px; color: #888; margin-bottom: 8px; }
    .stat-card .value {
      font-size: 36px; font-weight: bold; color: #a78bfa;
    }
    .stat-card .sub { font-size: 12px; color: #666; margin-top: 6px; }

    .page-stats { margin-top: 32px; }
    .page-stats h2 {
      font-size: 18px; color: #a78bfa; margin-bottom: 16px;
      border-bottom: 1px solid #2a2a4a; padding-bottom: 8px;
    }
    .page-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: #16213e; border-radius: 8px;
      margin-bottom: 8px; border: 1px solid #2a2a4a;
    }
    .page-row .name { font-size: 14px; }
    .page-row .count {
      font-size: 20px; font-weight: bold; color: #a78bfa;
    }
    .loading { text-align: center; color: #666; padding: 40px; }

    .back-link {
      display: inline-block; margin-bottom: 20px; color: #a78bfa;
      text-decoration: none; font-size: 14px; opacity: 0.8;
    }
    .back-link:hover { opacity: 1; }

    .note {
      text-align: center; color: #555; font-size: 12px; margin-top: 40px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">&larr; 返回首页</a>
    <h1>访问统计面板</h1>

    <!-- 全站统计 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">全站总访问量 (PV)</div>
        <div class="value" id="site_pv">-</div>
        <div class="sub">页面浏览次数</div>
      </div>
      <div class="stat-card">
        <div class="label">全站访客数 (UV)</div>
        <div class="value" id="site_uv">-</div>
        <div class="sub">独立访客人数</div>
      </div>
      <div class="stat-card">
        <div class="label">本页访问量</div>
        <div class="value" id="page_pv">-</div>
        <div class="sub">统计面板被查看次数</div>
      </div>
    </div>

    <!-- 各页面统计 -->
    <div class="page-stats">
      <h2>各工具页面访问量</h2>
      <div id="pageList" class="loading">加载中...</div>
    </div>

    <p class="note">数据由不蒜子提供，刷新页面更新 | 此页面不在首页展示</p>
  </div>

  <!-- 不蒜子 -->
  <span id="busuanzi_value_site_pv" style="display:none"></span>
  <span id="busuanzi_value_site_uv" style="display:none"></span>
  <span id="busuanzi_value_page_pv" style="display:none"></span>
  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

  <script>
    // 页面列表
    const pages = [
      { name: '首页', url: 'index.html' },
      { name: '柜号确认单', url: 'container_info.html' },
      { name: '授权书 - 多格式版', url: 'authorization_letter_multiple.html' },
      { name: '多功能工具', url: 'muiltiple_tool.html' },
    ];

    // 等不蒜子加载完成后更新数据
    function waitForBusuanzi() {
      const checkInterval = setInterval(() => {
        const pvEl = document.getElementById('busuanzi_value_site_pv');
        const uvEl = document.getElementById('busuanzi_value_site_uv');
        const pagePvEl = document.getElementById('busuanzi_value_page_pv');

        if (pvEl && pvEl.textContent && pvEl.textContent !== '') {
          clearInterval(checkInterval);

          document.getElementById('site_pv').textContent = pvEl.textContent;
          document.getElementById('site_uv').textContent = uvEl.textContent;
          document.getElementById('page_pv').textContent = pagePvEl.textContent;

          // 各页面统计通过 iframe 获取
          loadPageStats();
        }
      }, 200);

      // 超时
      setTimeout(() => {
        clearInterval(checkInterval);
        if (document.getElementById('site_pv').textContent === '-') {
          document.getElementById('site_pv').textContent = '加载失败';
        }
      }, 10000);
    }

    // 各页面统计
    function loadPageStats() {
      const container = document.getElementById('pageList');
      container.innerHTML = '';

      pages.forEach(page => {
        const row = document.createElement('div');
        row.className = 'page-row';
        row.innerHTML = `
          <span class="name">${page.name}<br><small style="color:#555">${page.url}</small></span>
          <span class="count" id="page_${page.url}">-</span>
        `;
        container.appendChild(row);

        // 用隐藏 iframe 获取每个页面的不蒜子 PV
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = page.url;
        iframe.onload = function() {
          try {
            const doc = iframe.contentDocument;
            const pvSpan = doc.getElementById('busuanzi_value_page_pv');
            if (pvSpan) {
              const check = setInterval(() => {
                if (pvSpan.textContent && pvSpan.textContent !== '') {
                  clearInterval(check);
                  document.getElementById('page_' + page.url).textContent = pvSpan.textContent;
                  document.body.removeChild(iframe);
                }
              }, 300);
              setTimeout(() => { clearInterval(check); }, 8000);
            }
          } catch(e) {
            // 跨域限制时无法获取
          }
        };
        document.body.appendChild(iframe);
      });
    }

    waitForBusuanzi();
  </script>
</body>
</html>
